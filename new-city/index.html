<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="New City" />
  <meta name="theme-color" content="#7a4cff" />
  <meta name="description" content="Smash old houses, build new ones and decorate a voxel city of idols!" />
  <title>New City — Build a Voxel Town</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- The 3D world is drawn here, behind everything else -->
  <canvas id="scene"></canvas>

  <!-- Avatar / wardrobe creator (shown first) -->
  <div id="creatorScreen" class="screen">
    <div class="creator-header">
      <h1>✨ Make Your Idol ✨</h1>
      <p>Dress up your super-strong hero, then go build a brand-new city!</p>
      <button id="lang-toggle-title" class="icon-btn lang-toggle" type="button" title="Change language">PL</button>
    </div>
  </div>

  <!-- In-game UI overlay (hidden until the avatar is done) -->
  <div id="gameUI" class="hidden">
    <div class="status-bar">
      <span id="dayIcon" class="day-icon">☀️</span>
      <span id="phaseLabel" class="phase-label">Smash the house!</span>
      <span class="houses">🏠 <span id="houseCount">0</span></span>
      <span class="spacer"></span>
      <button id="lang-toggle" class="icon-btn lang-toggle" type="button" title="Change language">PL</button>
      <button id="helpBtn" class="icon-btn" title="Help">❓</button>
      <button id="muteBtn" class="icon-btn" title="Sound on/off">🔊</button>
    </div>

    <div id="howto" class="howto-bar"></div>

    <div id="progressWrap" class="progress-wrap hidden">
      <div class="progress-label">Clean: 0%</div>
      <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div id="dialog" class="dialog hidden">
      <div class="dialog-bubble">
        <div class="dialog-text"></div>
        <div class="dialog-buttons"></div>
      </div>
    </div>

    <div id="celebrate" class="celebrate hidden">
      <div class="celebrate-title">🎉 Welcome home! 🎉</div>
      <div class="celebrate-sub"></div>
    </div>

    <div id="toolbar" class="toolbar"></div>
  </div>

  <div id="confetti" class="confetti"></div>

  <!-- Three.js r128 (UMD build) — bundled locally so the game works offline and inside the iOS app -->
  <script src="vendor/three.min.js"></script>
  <!-- game code -->
  <script src="src/data.js"></script>
  <script src="src/sound.js"></script>
  <script src="src/avatar.js"></script>
  <script src="src/world.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
